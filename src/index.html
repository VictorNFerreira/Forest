<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Forest</title>
        <link rel="stylesheet" href="./output.css">
        <link rel="icon" href="../favicon.png" type="image/png">
    </head>

    <body class="bg-verde-5 font-sans">
        <div class="container grid mt-4 justify-start  max-md:justify-center">
            <div class="inline-flex items-center bg-verde-6 rounded-md">
                <span class="block w-2 h-2 bg-verde-2 rounded-full relative -left-1"></span>
                <div class="flex text-base text-center text-verde-2 divide-x-2 divide-verde-5">
                    <p id="dia" class="px-4 py-2 capitalize">segunda</p>
                    <p id="temperatura" class="px-4 py-2">25°</p>
                    <p id="clima" class="px-4 py-2">🌤️</p>
                </div>
            </div>
        </div>

        <header class="container flex justify-between items-center py-8 gap-8">
            <a href=""><img src="./img/forest.svg" alt="Forest"></a>

            <nav>
                <ul class="flex flex-wrap gap-8 text-xl text-white">
                    <li><a class="hover:underline hover:underline-offset-4" href="#acomodacoes">Acomodações</a></li>
                    <li><a class="hover:underline hover:underline-offset-4" href="#eventos">Eventos</a></li>
                    <li><a class="hover:underline hover:underline-offset-4" href="#experiencias">Experiências</a></li>
                    <li><a class="hover:underline hover:underline-offset-4" href="#contato">Contato</a></li>
                </ul>
            </nav>
        </header>

        <main class="container">
            <div class="pt-64 px-8 pb-8 text-white bg-linear-to-t from-verde-7/80 to-transparent rounded-2xl overflow-hidden relative  max-sm:pt-12 max-sm:px-4">
                <img class="w-full h-full object-cover absolute inset-0 -z-10" src="./img/floresta.jpg" alt="">

                <div class="inline-flex items-center py-1 pr-1 pl-4 mb-8 gap-8 bg-verde-7 rounded-full  max-sm:flex max-sm:flex-col max-sm:p-4 max-sm:gap-2 max-sm:items-start max-sm:bg-verde-7/60 max-sm:rounded-xl">
                    <p class="text-base">Vagas para dezembro abertas</p>
                    <a class="inline-block px-4 py-2 text-verde-6 bg-verde-3 rounded-full" href="">Reserve Hoje</a>
                </div>

                <h1 class="max-w-screen-sm mb-20 text-5xl font-serif text-balance  max-sm:text-4xl max-sm:mb-8">Venha Experimentar a Vida na Floresta</h1>

                <div class="flex justify-between items-end text-sm  max-sm:grid">
                    <p class="max-sm:mb-4">Melhores locais para visitar <a class="underline decoration-2 underline-offset-2 hover:no-underline" href="">2048</a></p>

                    <div>
                        <p class="mb-2 uppercase">Recomendado por</p>
                        <p class="flex items-center gap-4"><img class="w-28" src="./img/parceiros/wildbeast.svg" alt="Wildbeast"><span>|</span>Revista Nacional</p>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
